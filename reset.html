<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#09090a" />
    <title>Recuperar contrasena | KM Detail Line</title>
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16.png" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css?v=7" />
  </head>
  <body class="reset-page">
    <header class="admin-header reset-header">
      <a class="brand" href="/"><span class="brand-mark">KM</span><span class="brand-divider"></span><strong>Detail Line</strong></a>
    </header>
    <main class="reset-main">
      <section class="reset-panel">
        <p class="eyebrow">Cuenta comercial</p>
        <h1 id="resetTitle">Recuperar contrasena</h1>
        <form class="account-form" id="requestResetForm">
          <label><span>Email</span><input name="email" type="email" required autocomplete="email" /></label>
          <button class="primary-button" type="submit">Enviar enlace</button>
        </form>
        <form class="account-form" id="completeResetForm" hidden>
          <label><span>Nueva contrasena</span><input name="password" type="password" minlength="10" required autocomplete="new-password" /></label>
          <label><span>Repetir contrasena</span><input name="passwordConfirmation" type="password" minlength="10" required autocomplete="new-password" /></label>
          <button class="primary-button" type="submit">Cambiar contrasena</button>
        </form>
        <p class="form-message" id="resetMessage" role="status"></p>
        <a class="recovery-link" href="/">Volver al sitio</a>
      </section>
    </main>
    <script src="./reset.js?v=1" defer></script>
  </body>
</html>
